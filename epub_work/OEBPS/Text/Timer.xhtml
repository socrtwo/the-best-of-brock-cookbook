<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN"
  "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <title>Kitchen Timer</title>
  <link href="../Styles/tools-modern.css" rel="stylesheet" type="text/css"/>
  <script src="../Misc/Timer.js" type="text/javascript"> </script>
</head>

<body class="tool-page">

  <div class="tool-header">
    <h1>Kitchen Timer</h1>
    <p class="subtitle">Run as many timers as your stovetop has burners</p>
  </div>

  <div class="tool-card">
    <h2>New Timer</h2>

    <div class="timer-new">
      <div class="timer-new-name">
        <label class="tool-label" for="timer-name">Name</label>
        <input class="tool-input" id="timer-name" type="text" placeholder="e.g. Rice, Eggs, Bread proof"/>
      </div>

      <div class="timer-new-time">
        <div class="timer-set-group">
          <label>Hours</label>
          <div class="timer-adjust">
            <button class="timer-adjust-btn" data-adj="h-input:-1" type="button">-</button>
            <input id="h-input" maxlength="2" type="text" value="00"/>
            <button class="timer-adjust-btn" data-adj="h-input:1" type="button">+</button>
          </div>
        </div>
        <div class="timer-set-group">
          <label>Minutes</label>
          <div class="timer-adjust">
            <button class="timer-adjust-btn" data-adj="m-input:-1" type="button">-</button>
            <input id="m-input" maxlength="2" type="text" value="00"/>
            <button class="timer-adjust-btn" data-adj="m-input:1" type="button">+</button>
          </div>
        </div>
        <div class="timer-set-group">
          <label>Seconds</label>
          <div class="timer-adjust">
            <button class="timer-adjust-btn" data-adj="s-input:-1" type="button">-</button>
            <input id="s-input" maxlength="2" type="text" value="00"/>
            <button class="timer-adjust-btn" data-adj="s-input:1" type="button">+</button>
          </div>
        </div>
      </div>
    </div>

    <div class="timer-preview">Ready: <strong id="preview">00:00:00</strong></div>

    <div class="timer-presets">
      <button class="timer-preset-btn" data-preset="0:1:0" type="button">1 min</button>
      <button class="timer-preset-btn" data-preset="0:3:0" type="button">3 min</button>
      <button class="timer-preset-btn" data-preset="0:5:0" type="button">5 min</button>
      <button class="timer-preset-btn" data-preset="0:10:0" type="button">10 min</button>
      <button class="timer-preset-btn" data-preset="0:15:0" type="button">15 min</button>
      <button class="timer-preset-btn" data-preset="0:20:0" type="button">20 min</button>
      <button class="timer-preset-btn" data-preset="0:30:0" type="button">30 min</button>
      <button class="timer-preset-btn" data-preset="0:45:0" type="button">45 min</button>
      <button class="timer-preset-btn" data-preset="1:0:0" type="button">1 hr</button>
      <button class="timer-preset-btn" data-preset="1:30:0" type="button">1.5 hr</button>
      <button class="timer-preset-btn" data-preset="2:0:0" type="button">2 hr</button>
    </div>

    <div class="tool-btn-group" style="justify-content:center;">
      <button class="tool-btn tool-btn-success tool-btn-lg" id="btn-add" type="button">Start Timer</button>
      <button class="tool-btn tool-btn-outline" id="btn-stop-audio" type="button">Silence Alert</button>
    </div>
  </div>

  <div class="tool-card">
    <h2>Active Timers</h2>
    <div id="timer-list"></div>
  </div>

  <audio id="timerAudio" preload="auto">
    <source src="../Audio/airhorn.mp3" type="audio/mpeg"/>
  </audio>

</body>
</html>
