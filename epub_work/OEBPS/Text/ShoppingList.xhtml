<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN"
  "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <title>Shopping List</title>
  <link href="../Styles/tools-modern.css" rel="stylesheet" type="text/css"/>
  <script src="../Misc/Scaler.js" type="text/javascript"> </script>
  <script src="../Misc/Shopping.js" type="text/javascript"> </script>
</head>

<body class="tool-page">

  <div class="tool-header">
    <h1>Shopping List</h1>
    <p class="subtitle">Combine ingredients from as many recipes as you like &#8212; then check off what&#8217;s already in the pantry</p>
  </div>

  <div class="tool-card">
    <h2>Recipes</h2>
    <div id="recipe-cards"></div>
    <div class="tool-btn-group" style="justify-content:center; margin-top:8px;">
      <button class="tool-btn tool-btn-primary" id="btn-add-recipe" type="button">+ Add Another Recipe</button>
      <button class="tool-btn tool-btn-outline" id="btn-clear-all" type="button">Clear All</button>
    </div>
  </div>

  <div class="tool-card" id="resultCard" style="display:none;">
    <div class="shop-result-head">
      <h2>Your List</h2>
      <div class="shop-count" id="shop-count"></div>
    </div>
    <p class="shop-hint">Tick the box next to anything you already have at home &#8212; it will stay in the list, struck through, so nothing gets lost.</p>
    <div id="shop-list"></div>
    <div class="tool-btn-group" style="justify-content:center; margin-top:16px;">
      <button class="tool-btn tool-btn-success" id="btn-copy" type="button">Copy (only what I need)</button>
      <button class="tool-btn tool-btn-info" id="btn-print" type="button">Print</button>
      <button class="tool-btn tool-btn-outline" id="btn-clear-have" type="button">Un-check All</button>
    </div>
  </div>

</body>
</html>
